services:
  cohab-db:
    image: 'postgres:16-alpine'
    environment:
      - POSTGRES_DB=${COHAB_DB}
      - POSTGRES_PASSWORD=${COHAB_DB_PASSWORD}
      - POSTGRES_USER=${COHAB_DB_USER}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  kafka1:
    image: apache/kafka:4.0.2
    ports:
      - "127.0.0.1:9092:9092"
      - "127.0.0.1:9091:9091"
    environment:
      KAFKA_LISTENERS: CONTROLLER://0.0.0.0:9091,PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://${KAFKA_DOMAIN_1}:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka1:9091

  mongodb:
    image: mongo:7.0
    container_name: cohab-mongodb
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7.2-alpine
    container_name: cohab-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data

  clickhouse:
    image: clickhouse/clickhouse-server:25.1.2.3
    environment:
      CLICKHOUSE_USER: events
      CLICKHOUSE_PASSWORD: events
      CLICKHOUSE_DB: events
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1

    ports:
      - "127.0.0.1:8123:8123"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./init/init_clickhouse.sh:/docker-entrypoint-initdb.d/init-clickhouse.sh

  cohab-back:
    image: ghcr.io/cooperativehabitat/cohab:main
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - COHAB_DB=${COHAB_DB}
      - COHAB_DB_PASSWORD=${COHAB_DB_PASSWORD}
      - COHAB_DB_USER=${COHAB_DB_USER}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_EXPIRES_AT=${JWT_EXPIRES_AT}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - ALLOWED_METHODS=${ALLOWED_METHODS}
      - COHAB_SERVER_PORT=${COHAB_SERVER_PORT}
      - LOGGING_LEVEL=${LOGGING_LEVEL}
      - SHOW_SQL=${SHOW_SQL}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
    ports:
      - 127.0.0.1:${COHAB_SERVER_PORT}:${COHAB_SERVER_PORT}
    depends_on:
      - cohab-db
      - kafka1

  cohab-front:
    build:
      context: ../CoHab-frontend/
      dockerfile: Dockerfile
      tags:
        - cohab-frontend
    image: 'cohab-frontend'
    ports:
      - 127.0.0.1:${OUTER_FRONTEND_PORT}:80

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  clickhouse_data: